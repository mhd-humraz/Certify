version: '3.9'

services:
  web:
    build: .
    command: gunicorn certifypro.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=certifypro.settings
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: certifypro
      POSTGRES_USER: certifypro
      POSTGRES_PASSWORD: certifypro_secret

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
  static_data:
