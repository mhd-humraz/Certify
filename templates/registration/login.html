<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – CertifyPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e293b 0%, #312e81 100%);
      min-height: 100vh; display: flex; align-items: center;
      font-family: 'Inter', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      padding: 2.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,.35);
    }
    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; }
    .brand span { color: #4f46e5; }
    .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    .btn-login { background: #4f46e5; color: #fff; border: none; padding: .7rem; font-weight: 600; }
    .btn-login:hover { background: #3730a3; color: #fff; }
    .hint { font-size: .78rem; color: #64748b; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-auto">
      <div class="login-card">
        <div class="text-center mb-4">
          <div class="brand">Certify<span>Pro</span></div>
          <p class="text-muted small mt-1">Smart Bulk Certificate Generation System</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2">Invalid credentials. Please try again.</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-500">Username</label>
            <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-500">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-login w-100 rounded-2">Sign In</button>
        </form>

        <p class="hint text-center mt-4 mb-0">
          Default: <code>admin / admin123</code> (run <code>setup.sh</code> first)
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
