{% extends "base.html" %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-danger">
      <div class="card-header py-3 text-danger">
        <i class="bi bi-exclamation-triangle me-2"></i>Confirm Deletion
      </div>
      <div class="card-body text-center py-4">
        <i class="bi bi-trash3 fs-1 text-danger mb-3 d-block"></i>
        <h5>Delete {{ type }}?</h5>
        <p class="text-muted">Are you sure you want to delete <strong>"{{ object }}"</strong>?
        This action cannot be undone.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
